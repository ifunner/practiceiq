<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PracticeIQ</title>
<meta name="description" content="Pressure left, then swing. Practice, speed, putting and scoring tracker.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A201A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PracticeIQ">
<link rel="icon" href="practiceiq-logo/favicon.svg" type="image/svg+xml">
<link rel="icon" href="practiceiq-logo/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="practiceiq-logo/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<!-- Shared GolfIQ design system (vendored — edit in golfiq-design/ and re-sync).
     Linked before the inline styles so PracticeIQ's component rules layer on top. -->
<link rel="stylesheet" href="golfiq.css">
<style>
  /* Tokens, page background, and shared primitives come from golfiq.css.
     Only PracticeIQ-specific token aliases live here. */
  :root{
    --dim:var(--ink-dim);
    --card:var(--panel); --card2:var(--panel-hi);
    --bad:var(--red); --ok:var(--path);
    --line2:#325a4d;
  }
  /* Reconcile the shared golfiq.css base with PracticeIQ's reset-based buttons
     and bespoke .app/.wrap layout, so shared base rules don't leak through. */
  .app{padding:0}
  header{margin-bottom:0}
  button{padding:0;border-radius:0}
  details summary::after{content:none}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:var(--felt-deep)}
  html,body{margin:0;overscroll-behavior-y:none}
  body{
    min-height:100vh;
    background-color:var(--felt-deep);
    background-image:radial-gradient(120% 60% at 50% -10%, #16382d 0%, var(--felt) 42%, var(--felt-deep) 100%);
    background-attachment:fixed;
    color:var(--ink); font-family:var(--ui); font-size:13px;
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding-bottom:calc(86px + env(safe-area-inset-bottom));
  }
  .app{max-width:520px;margin:0 auto;min-height:100vh}
  .wrap{padding:14px 14px 32px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--sage)}
  h1,h2,h3{margin:0;letter-spacing:-.01em}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:var(--path)}

  /* Header */
  header{position:sticky;top:0;z-index:20;background:transparent;
    padding:calc(14px + env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:9px}
  .brand svg{width:30px;height:30px;display:block}
  .brand .wm{display:inline-flex;align-items:baseline;gap:.14em;font-size:21px;letter-spacing:-.028em;line-height:1}
  .brand .wm b{font-weight:700;color:var(--path);margin-left:0}
  .brand .wm span{font-weight:500;color:var(--ink)}
  .suite{font-size:10px;font-weight:600;color:var(--sage);letter-spacing:.12em;text-transform:uppercase}

  /* Cue banner — flag-yellow accent rail */
  .cue{display:flex;align-items:flex-start;gap:11px;background:var(--panel);border:1px solid var(--line);
    border-left:3px solid var(--flag);border-radius:var(--r);padding:13px 15px;margin-bottom:13px;
    box-shadow:0 1px 0 rgba(255,255,255,.025) inset,0 8px 24px -18px #000}
  .cue .dot{width:9px;height:9px;border-radius:50%;background:var(--flag);flex:none;margin-top:8px;box-shadow:0 0 0 4px rgba(244,208,63,.14)}
  .cue-body{flex:1;min-width:0}
  .cue-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .cue-head small{display:block;font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--sage)}
  .cue b,.cue .cue-txt{color:var(--flag);font-weight:600;display:block;font-size:15px;line-height:1.35;cursor:pointer}
  .cue-link{font-size:12px;color:var(--ink-dim);padding:0;margin-top:4px;text-decoration:underline;text-underline-offset:3px}
  .cue-input{width:100%;background:var(--felt-deep);border:1px solid var(--line);color:var(--ink);
    border-radius:11px;padding:10px 12px;font-family:var(--ui);font-size:15px;font-weight:600;margin-top:4px}
  .cue-input:focus{outline:none;border-color:var(--flag)}
  .cue-actions{display:flex;gap:8px;margin-top:10px}
  .cue-sw{flex:none;width:44px;height:26px;border-radius:99px;background:var(--felt-deep);border:1px solid var(--line);
    padding:3px;position:relative;transition:.15s}
  .cue-sw i{display:block;width:18px;height:18px;border-radius:50%;background:var(--sage);transition:.15s}
  .cue-sw.on{background:rgba(244,208,63,.18);border-color:var(--flag)}
  .cue-sw.on i{transform:translateX(18px);background:var(--flag)}

  /* Cards & metrics */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:13px;
    box-shadow:0 1px 0 rgba(255,255,255,.025) inset,0 8px 24px -18px #000}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.025) inset,0 8px 24px -18px #000}
  .metric.hero{grid-column:1/3;background:linear-gradient(180deg,#0c2820,#0a221b);border-color:#2c5446}
  .metric .lbl{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--sage)}
  .metric .val{font-family:var(--mono);font-weight:600;font-size:30px;line-height:1.05;margin-top:7px;display:flex;align-items:baseline;gap:7px;letter-spacing:-.02em}
  .metric.hero .val{font-size:46px}
  .metric .val s{text-decoration:none;font-size:13px;color:var(--ink-dim);font-weight:500}
  .metric .sub{font-size:11.5px;color:var(--ink-dim);margin-top:5px}
  .spark{margin-top:9px}
  .tgt-ok{color:var(--path)} .tgt-bad{color:var(--red)} .tgt-warn{color:var(--flag)}

  /* Lists / rows */
  .row{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
  .row:first-child{border-top:none}
  .row .g{flex:1;min-width:0}
  .row .t{font-weight:500}
  .row .d{font-size:12px;color:var(--ink-dim);margin-top:2px}
  .pill{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:3px 7px;border-radius:6px;border:1px solid var(--line);color:var(--ink-dim);white-space:nowrap}
  .pill.full{background:rgba(70,201,138,.13);border-color:transparent;color:var(--path)}
  .pill.speed{background:rgba(244,208,63,.13);border-color:transparent;color:var(--flag)}
  .pill.putt{background:rgba(242,235,218,.08);color:var(--ink)}
  .pill.score{background:rgba(224,106,92,.14);border-color:transparent;color:var(--red)}

  /* Section heads */
  .sect{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--sage);margin:26px 2px 12px}
  .sect:first-child{margin-top:4px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    padding:9px 12px;border-radius:11px;border:1px solid var(--line);
    background:var(--panel-hi);color:var(--ink);font-weight:600;font-size:13px;
    transition:transform .04s ease,background .15s,border-color .15s}
  .btn:active{transform:scale(.96)}
  .btn.primary{background:var(--flag);border-color:var(--flag);color:#1a1500}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn.sm{width:auto;padding:5px 10px;font-size:13px}
  .btn[disabled]{opacity:.45;pointer-events:none}

  /* Segmented control */
  .seg{display:inline-flex;width:100%;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:13px}
  .seg button{flex:1;padding:6px 11px;border-radius:0;font-size:12px;font-weight:600;color:var(--ink-dim);border:none;background:transparent}
  .seg button.on{background:var(--flag);color:#1a1500}

  /* Forms */
  label.f{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--sage);margin:14px 0 6px}
  input[type=number],input[type=text],textarea,select{
    width:100%;background:var(--felt-deep);border:1px solid var(--line);color:var(--ink);
    border-radius:11px;padding:12px;font-family:var(--mono);font-size:15px}
  textarea{font-family:var(--ui);min-height:64px;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--flag)}
  input[type=range]{width:100%;accent-color:var(--flag);margin:6px 0 0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid2>*{min-width:0}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

  /* Tally tap buttons */
  .taps{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .tap{background:var(--felt-deep);border:1px solid var(--line);border-radius:11px;padding:14px 10px;text-align:left}
  .tap .tn{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1}
  .tap .tl{font-size:12px;color:var(--ink-dim);margin-top:4px}
  .tap.pure{border-color:rgba(70,201,138,.5)} .tap.pure .tn{color:var(--path)}
  .tap.fat{border-color:rgba(224,106,92,.5)} .tap.fat .tn{color:var(--red)}
  .tap:active{transform:scale(.96)}
  .counter{display:flex;align-items:center;background:var(--felt-deep);
    border:1px solid var(--line);border-radius:11px;overflow:hidden;padding:0;margin-top:8px}
  .counter .cc{display:flex;align-items:center;flex:1}
  .counter button{width:38px;height:38px;border-radius:0;background:transparent;border:none;
    font-size:19px;font-weight:400;color:var(--sage);display:flex;align-items:center;justify-content:center}
  .counter .num{font-family:var(--mono);font-size:17px;font-weight:600;min-width:34px;text-align:center;flex:1}

  /* Checkable steps */
  .step{display:flex;gap:12px;padding:13px 0;border-top:1px solid var(--line);align-items:flex-start}
  .step:first-child{border-top:none}
  .chk{flex:none;width:24px;height:24px;border-radius:7px;border:1.5px solid var(--line);margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:.12s}
  .chk.on{background:var(--path);border-color:var(--path)}
  .chk svg{width:14px;height:14px;opacity:0;transition:.12s}.chk.on svg{opacity:1}
  .step .sg{flex:1}
  .step .st{font-weight:500}
  .step.done .st{color:var(--ink-dim);text-decoration:line-through}
  .step .sd{font-size:12.5px;color:var(--ink-dim);margin-top:3px}
  .step .sp{font-size:9.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--path);margin-top:5px}
  .mins{font-family:var(--mono);font-size:11px;color:var(--ink-dim);flex:none}

  /* Stars */
  .stars{display:flex;gap:8px;margin-top:6px}
  .stars button{font-size:26px;color:var(--line);line-height:1}
  .stars button.on{color:var(--flag)}

  /* Plan */
  .planday{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--line);align-items:flex-start}
  .planday:first-child{border-top:none}
  .planday .dn{font-family:var(--mono);font-size:11px;color:var(--ink-dim);width:30px;flex:none;padding-top:2px}
  .planday.done .pt{color:var(--ink-dim);text-decoration:line-through}
  .planday .pt{font-weight:500;font-size:14.5px}
  .planday .pd{font-size:12px;color:var(--ink-dim);margin-top:2px}
  .planday .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .weekhdr{font-size:10.5px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--flag);
    margin:20px 2px 4px;padding-top:14px;border-top:1px solid var(--line)}
  .weekhdr:first-of-type{border-top:none;padding-top:0}

  /* Checkpoint */
  .cp{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .cp:first-child{border-top:none}
  .cp .cv{font-family:var(--mono);font-weight:700;font-size:15px;flex:none;min-width:74px;text-align:right}
  .cp .cg{flex:1}
  .cp .ct{font-size:13.5px;font-weight:500}
  .cp .cs{font-size:11.5px;color:var(--ink-dim);margin-top:2px}

  /* Nav */
  nav.tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;z-index:40;width:100%;max-width:520px;
    background:rgba(9,26,21,.92);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;padding:6px 8px calc(8px + env(safe-area-inset-bottom))}
  nav.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-dim);
    padding:7px 0;border-radius:12px;transition:color .15s}
  nav.tabbar button.on{color:var(--flag)}
  nav.tabbar svg{width:21px;height:21px}
  nav.tabbar .nl{font-size:10.5px;font-weight:700;letter-spacing:.04em}

  .muted{color:var(--ink-dim)}
  .small{font-size:12.5px}
  .empty{text-align:center;color:var(--ink-dim);padding:26px 10px;font-size:13.5px}
  .toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--panel-hi);border:1px solid var(--line);color:var(--ink);
    font-weight:600;font-size:13px;padding:10px 16px;border-radius:99px;
    z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:90%;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0}
  .hide{display:none!important}
  details.ref{border:1px solid var(--line);border-radius:var(--r);padding:0 15px;margin-bottom:13px;background:var(--panel);
    box-shadow:0 1px 0 rgba(255,255,255,.025) inset,0 8px 24px -18px #000}
  details.ref summary{list-style:none;cursor:pointer;padding:14px 0;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .ref-stack{margin-top:18px}
  .ref-stack .sect{margin-top:0}
  details.ref summary::-webkit-details-marker{display:none}
  details.ref summary .x{color:var(--sage);font-family:var(--mono);font-size:18px;transition:transform .2s}
  details.ref[open] summary .x{transform:rotate(45deg)}
  details.ref .body{padding:0 0 15px;line-height:1.62;color:var(--ink-dim)}
  details.ref .body b{color:var(--ink)}
  .ol{counter-reset:s;list-style:none;padding:0;margin:0}
  .ol li{counter-increment:s;position:relative;padding:9px 0 9px 34px;border-top:1px solid var(--line);font-size:14px}
  .ol li:first-child{border-top:none}
  .ol li::before{content:counter(s);position:absolute;left:0;top:9px;font-family:var(--mono);font-weight:700;
    color:var(--flag);font-size:12px;width:22px;height:22px;border:1px solid var(--line);border-radius:6px;
    display:flex;align-items:center;justify-content:center}
  .flag{display:flex;gap:11px;padding:12px 0;border-top:1px solid var(--line);align-items:flex-start}
  .flag:first-child{border-top:none}
  .flag .fx{flex:none;width:7px;height:7px;border-radius:50%;background:var(--red);margin-top:7px}
  .flag .ft{font-weight:500;font-size:14px}
  .flag .fd{font-size:12.5px;color:var(--ink-dim);margin-top:2px}
  .flag .fc{font-size:11px;font-weight:600;color:var(--flag);margin-top:4px}

  /* Home session v2 */
  .focusprog{height:8px;background:var(--felt-deep);border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-bottom:14px}
  .focusprog i{display:block;height:100%;background:var(--path);border-radius:99px;transition:width .2s}
  .focushdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
  .focushdr .fn{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--sage)}
  .timer{font-family:var(--mono);font-size:28px;font-weight:600;text-align:center;margin:10px 0 14px;letter-spacing:-.02em}
  .timer.warn{color:var(--flag)}
  .steptrack{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .steptrack .tlbl{font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--sage);margin-bottom:8px}
  .steptrack .big{font-family:var(--mono);font-size:32px;font-weight:600;text-align:center;margin:6px 0 10px;letter-spacing:-.02em}
  .steptrack .big.ok{color:var(--path)}
  .homebar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;margin-top:11px}
  .homebar .btn.sm{flex:1;min-width:120px}
  .todayok{color:var(--path);font-size:13px;margin-top:10px}

  @keyframes pgin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .view-in{animation:pgin .18s ease}

  @media (prefers-reduced-motion:reduce){
    .view-in{animation:none}
    *{transition:none!important}
  }

  @media print{
    nav,header,.cue .dot,.btn,.seg{display:none!important}
    body{background:#fff;color:#111;padding:0}
    .app{max-width:none}
    .card,.metric{border-color:#ccc;background:#fff}
    .metric .val,.tgt-ok,.tgt-bad,.tgt-warn{color:#111!important}
    .sect,.eyebrow,.metric .lbl{color:#555!important}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <svg viewBox="0 0 100 100" fill="none" aria-hidden="true">
        <rect x="25" y="16" width="50" height="68" rx="8" stroke="#F2EBDA" stroke-width="4.4"></rect>
        <circle cx="36" cy="37" r="3.2" fill="#F4D03F"></circle>
        <path d="M44 37 H66" stroke="#46C98A" stroke-width="4" stroke-linecap="round"></path>
        <circle cx="36" cy="50" r="3.2" fill="rgba(242,235,218,.5)"></circle>
        <path d="M44 50 H62" stroke="rgba(242,235,218,.5)" stroke-width="4" stroke-linecap="round"></path>
        <circle cx="36" cy="63" r="3.2" fill="rgba(242,235,218,.5)"></circle>
        <path d="M44 63 H58" stroke="rgba(242,235,218,.5)" stroke-width="4" stroke-linecap="round"></path>
      </svg>
      <div class="wm"><span>Practice</span><b>IQ</b></div>
    </div>
    <div class="suite">GolfIQ suite</div>
  </header>

  <main class="wrap" id="view"></main>
</div>

<nav class="tabbar" id="nav"></nav>
<div class="toast" id="toast"></div>

<script>
/* ============================ CONTENT ============================ */
const DEFAULT_SWING_THOUGHT = "Pressure left, then swing.";
const SETTINGS_KEY = "settings";
let CUE_SETTINGS = { text: DEFAULT_SWING_THOUGHT, show: true };
let CUE_EDITING = false;

/* The six red flags, drawn from the bad-shot triggers, each with a catch-it cue. */
const RED_FLAGS = [
  {t:"Aggressive from the top", d:"Rushing the downswing and throwing the club from the top.", c:"Cue: start down slow, let it build."},
  {t:"Hips spin before pressure shifts", d:"Body opens early while weight is still on the trail side.", c:"Cue: pressure into the lead foot first, then turn."},
  {t:"Trying to hit it harder", d:"Adding effort beyond your stock 70–80% swing.", c:"Cue: smooth wins — speed comes from sequence."},
  {t:"Losing balance / sequencing", d:"Off-balance finish, out of order from the ground up.", c:"Cue: hold the finish for two seconds."},
  {t:"Standing up through impact", d:"Early extension — hips thrust toward the ball, posture lost.", c:"Cue: keep the tush line, stay in your posture."},
  {t:"Hanging back on the trail foot", d:"Weight stuck on the back side, low point behind the ball.", c:"Cue: finish with the trail heel up, belt buckle left."}
];

/* Pre-shot and pre-putt routines */
const PRESHOT = [
  "Stand behind the ball and pick the smallest target you can.",
  "Take one rehearsal swing feeling pressure move into your lead foot before you turn.",
  "Step in and set your feet to the target line.",
  "One look at the target, one breath out.",
  "Trigger: say \u201cpressure left\u201d \u2014 then swing at 70\u201380%."
];
const PREPUTT = [
  "Read from behind the ball; pick a start line and an apex point.",
  "Two practice strokes while looking at the hole \u2014 feel the pace, not the line.",
  "Set the putter face square to your start line.",
  "Eyes hole \u2192 ball \u2192 stroke. No freeze, no third practice stroke."
];

/* Home routines */
const ROUTINE_DAILY = {
  name:"Daily routine", time:"10\u201315 min",
  steps:[
    {t:"Pressure preview \u2014 no ball", m:2, p:"Pressure shift", track:"reps", target:10,
      d:"Feet together. As you start down, step into the lead foot so weight moves left before the body turns. 10 slow reps."},
    {t:"Divot Board low-point ladder \u2014 foam balls", m:6, p:"Low-point / strike", track:"divot", target:10,
      d:"Slow L-to-L swings at 70%. Goal: every strike mark starts at or after the ball. Count how many of 10 bottom out after the ball."},

const DB_NAME="practiceiq", STORE="records";
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);
  r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains(STORE)){
    const s=db.createObjectStore(STORE,{keyPath:"id"});s.createIndex("type","type");s.createIndex("date","date");}};
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbAll(){return openDB().then(db=>new Promise((res,rej)=>{const req=db.transaction(STORE).objectStore(STORE).getAll();
  req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);}));}
function dbPut(rec){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");
  tx.objectStore(STORE).put(rec);tx.oncomplete=()=>res(rec);tx.onerror=()=>rej(tx.error);}));}
function dbDel(id){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");
  tx.objectStore(STORE).delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}
function dbClear(){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");
  tx.objectStore(STORE).clear();tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);}));}

/* ============================ METRICS ============================ */
function rangeMetrics(r){
  const total=r.tally.pure+r.tally.thin+r.tally.fat+r.tally.mishit;
  const score=r.tally.pure*3+r.tally.thin*1;
  const grade= total? Math.round(score/(total*3)*100):0;
  const ballFirst= total? Math.round((r.tally.pure+r.tally.thin)/total*100):0;
  const lowTot=r.low.before+r.low.at+r.low.after;
  const afterPct= lowTot? Math.round(r.low.after/lowTot*100):null;
  const fatPer70= r.size? +(r.tally.fat/r.size*70).toFixed(1):r.tally.fat;
  return {total,grade,ballFirst,afterPct,fatPer70};
}
function gradeLetter(p){return p>=85?"A":p>=70?"B":p>=55?"C":p>=40?"D":"F";}
function puttMake(p){const m=p.d3.makes+p.d6.makes,a=p.d3.att+p.d6.att;return a?Math.round(m/a*100):null;}
function handicap(){
  const rounds=byType("round").filter(r=>r.rating&&r.slope&&r.score);
  if(!rounds.length)return null;
  const diffs=rounds.map(r=>(r.score-r.rating)*113/r.slope).sort((a,b)=>a-b);
  const n=Math.min(8,diffs.length);
  const avg=diffs.slice(0,n).reduce((s,d)=>s+d,0)/n;
  return +(avg*0.96).toFixed(1);
}
function streak(){
  const days=new Set(RECORDS.filter(r=>["home","range","speed","putting"].includes(r.type)).map(r=>r.date));
  if(!days.size)return 0;
  let n=0;const d=new Date();
  // allow today or yesterday as the anchor
  const iso=x=>x.toISOString().slice(0,10);
  if(!days.has(iso(d))){d.setDate(d.getDate()-1);if(!days.has(iso(d)))return 0;}
  while(days.has(iso(d))){n++;d.setDate(d.getDate()-1);}
  return n;
}
function nextPlanDay(){const done=new Set(planRec().done);for(const p of PLAN)if(!done.has(p.d))return p;return null;}

/* ============================ HOME METRICS ============================ */
function homeRoutine(mode){return mode==="extended"?ROUTINE_EXT:ROUTINE_DAILY;}
function emptyStepData(step){
  const d={done:false};
  if(step.track==="reps")d.reps=0;
  else if(step.track==="divot")d.after=0,d.total=0;
  else if(step.track==="putt3")d.makes=0,d.att=0,d.streak=0,d.bestStreak=0;
  else if(step.track==="strike")d.heel=0,d.center=0,d.toe=0;
  else if(step.track==="puttLadder")d.d6m=0,d.d6a=0,d.d10m=0,d.d10a=0,d.lagSafe=0,d.lagAtt=0;
  return d;
}
function normalizeHomeRec(r){
  if(r.stepData)return r;
  const steps=homeRoutine(r.mode||"daily").steps;
  r.stepData=steps.map((s,i)=>({...emptyStepData(s),done:!!(r.steps&&r.steps[i])}));
  return r;
}
function homeStepsDone(r){const n=normalizeHomeRec(r);return n.stepData.filter(s=>s.done).length;}
function homeStepTotal(r){return homeRoutine(r.mode||"daily").steps.length;}
function homeDivotPct(r){
  const steps=homeRoutine(r.mode||"daily").steps;
  let after=0,total=0;
  normalizeHomeRec(r).stepData.forEach((d,i)=>{if(steps[i].track==="divot"){after+=d.after||0;total+=d.total||0;}});
  return total?Math.round(after/total*100):null;
}
function homePutt3Pct(r){
  const steps=homeRoutine(r.mode||"daily").steps;
  let m=0,a=0;
  normalizeHomeRec(r).stepData.forEach((d,i)=>{if(steps[i].track==="putt3"){m+=d.makes||0;a+=d.att||0;}});
  return a?Math.round(m/a*100):null;
}
function homeSummary(r){
  normalizeHomeRec(r);
  const parts=[`${homeStepsDone(r)}/${homeStepTotal(r)} steps`];
  if(r.adherence)parts.push("\u2605".repeat(r.adherence));
  const dp=homeDivotPct(r);if(dp!=null)parts.push(`${dp}% divot after`);
  const p3=homePutt3Pct(r);if(p3!=null)parts.push(`${p3}% 3-ft`);
  return parts.join(" \u00b7 ");
}
function homeStreak(){
  const days=new Set(byType("home").map(r=>r.date));
  if(!days.size)return 0;
  let n=0;const d=new Date();const iso=x=>x.toISOString().slice(0,10);
  if(!days.has(iso(d))){d.setDate(d.getDate()-1);if(!days.has(iso(d)))return 0;}
  while(days.has(iso(d))){n++;d.setDate(d.getDate()-1);}
  return n;
}
function homeWeekSessions(){
  const d=new Date();d.setDate(d.getDate()-6);
  const cutoff=d.toISOString().slice(0,10);
  return new Set(byType("home").filter(r=>r.date>=cutoff).map(r=>r.date)).size;
}
function homeWeekSeries(){
  const out=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    out.push(byType("home").some(r=>r.date===iso)?1:0);
  }
  return out;
}
function avgHomeAdherence(recs){
  const vals=recs.filter(r=>r.adherence).map(r=>r.adherence);
  return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
}
function stepMetricLine(stepDef,data){
  if(stepDef.track==="reps"&&(data.reps||data.done))return `${data.reps||0}/${stepDef.target} reps`;
  if(stepDef.track==="divot"&&data.total)return `${data.after}/${data.total} after ball`;
  if(stepDef.track==="putt3"&&data.att)return `${data.makes}/${data.att} makes${data.bestStreak?` \u00b7 best ${data.bestStreak}`:""}`;
  if(stepDef.track==="strike"){const t=(data.heel||0)+(data.center||0)+(data.toe||0);return t?`${data.center} ctr \u00b7 ${data.heel} heel \u00b7 ${data.toe} toe`:"";}
  if(stepDef.track==="puttLadder"){
    const bits=[];
    if(data.d6a)bits.push(`6ft ${data.d6m}/${data.d6a}`);
    if(data.d10a)bits.push(`10ft ${data.d10m}/${data.d10a}`);
    if(data.lagAtt)bits.push(`lag ${data.lagSafe}/${data.lagAtt}`);
    return bits.join(" \u00b7 ");
  }
  return data.done?"Done":"";
}

/* tiny sparkline */
function spark(vals,{w=120,h=26,color="var(--fairway)",invert=false}={}){
  if(!vals||vals.length<2)return "";
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>{const x=i/(vals.length-1)*w;const y=h-((v-min)/rng)*(h-4)-2;return [x,y];});
  const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.6" fill="${color}"/></svg>`;
}

    </div><div class="pill">${rm.fatPer70<2?"on target":"tracking"}</div></div></div>`;
  }

  if(np){
    html+=`<div class="sect">Plan \u2014 Day ${np.d}</div>
    <div class="card">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${pillFor(np)}</div>
      <div class="t" style="font-weight:600;font-size:16px;margin-top:9px">${esc(np.focus)}</div>
      <div class="d" style="margin-top:5px;font-size:13px;color:var(--dim)">${esc(np.note)}</div>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
        <button class="btn primary sm" onclick="startHomeRoutine('${np.mode}',true)">${np.mode==="extended"?"Extended routine":"Daily routine"}</button>
        ${np.range?`<button class="btn ghost sm" onclick="go('practice','range')">Range</button>`:""}
        ${np.speed?`<button class="btn ghost sm" onclick="go('practice','speed')">Speed</button>`:""}
        ${np.round?`<button class="btn ghost sm" onclick="go('rounds')">Round</button>`:""}
      </div>
    </div>`;
  } else {
    html+=`<div class="sect">Plan complete</div><div class="card"><div class="muted small">All 30 days done. Review the month and set your next single swing thought.</div></div>`;
  }

  const recent=RECORDS.filter(r=>r.type!=="meta"&&r.id!==HOME_DRAFT_KEY&&r.id!==SETTINGS_KEY).sort((a,b)=>(a.date<b.date?1:-1)).slice(0,5);
  html+=`<div class="sect">Recent</div><div class="card">`;
  if(!recent.length) html+=`<div class="empty">Nothing logged yet. Your sessions show up here.</div>`;
  else html+=recent.map(rowFor).join("");
  html+=`</div>`;

  view.innerHTML=html;
}
function cueHTML(){
  if(!cueVisible())return "";
  const txt=esc(swingThoughtText());

  if(CUE_EDITING){
    body=`<input class="cue-input" id="cueInput" type="text" maxlength="120" value="${txt}" placeholder="One swing thought"
      onkeydown="if(event.key==='Enter')saveCueText();if(event.key==='Escape')cancelCueEdit()">
      <div class="cue-actions"><button type="button" class="btn primary sm" onclick="saveCueText()">Save</button>
      <button type="button" class="btn ghost sm" onclick="cancelCueEdit()">Cancel</button></div>`;
  }else{
    body=`<b class="cue-txt" onclick="startCueEdit()">${txt}</b>
      <button type="button" class="cue-link" onclick="startCueEdit()">Edit</button>`;
  }
  return `<div class="cue"><span class="dot"></span><div class="cue-body">
    <div class="cue-head"><small>Swing thought</small>
      <button type="button" class="cue-sw on" onclick="toggleCueShow()" aria-label="Hide swing thought" aria-pressed="true"><i></i></button></div>
    ${body}</div></div>`;

function pillFor(p){
  const map={full:["full","Full swing"],speed:["speed","Speed"],putt:["putt","Putting"],score:["score","Scoring"]};
  let out=`<span class="pill ${map[p.pillar][0]}">${map[p.pillar][1]}</span>`;
  if(p.range)out+=`<span class="pill">Range 70</span>`;
  if(p.speed)out+=`<span class="pill">Skillz</span>`;
  if(p.round)out+=`<span class="pill">Play 9</span>`;
  if(p.checkpoint)out+=`<span class="pill" style="color:var(--yellow);border-color:rgba(244,208,63,.4)">Checkpoint</span>`;
  return out;
}
function rowFor(r){
  let title="",detail="";
  if(r.type==="range"){const m=rangeMetrics(r);title=`Range \u00b7 ${m.total} balls`;detail=`Grade ${gradeLetter(m.grade)} \u00b7 ${r.tally.fat} fat \u00b7 ${m.ballFirst}% ball-first`;}
  else if(r.type==="home"){const n=normalizeHomeRec(r);title=`${n.mode==="extended"?"Extended":"Daily"} home`;detail=homeSummary(n);}
  else if(r.type==="speed"){const mx=Math.max(...r.readings.map(x=>x.max||0));title=`Speed \u00b7 max ${mx||"\u2014"} mph`;detail=`${r.balanceHeld?"Balance held":"Balance dropped"}`;}
  else if(r.type==="putting"){const p=puttMake(r);title=`Putting \u00b7 ${p!=null?p+"% short":"logged"}`;detail=`3ft ${r.d3.makes}/${r.d3.att} \u00b7 6ft ${r.d6.makes}/${r.d6.att} \u00b7 10ft ${r.d10.makes}/${r.d10.att}`;}
  else if(r.type==="round"){title=`Round \u00b7 ${r.score}`;detail=`${r.doubles} dbl+ \u00b7 ${r.threePutts} 3-putts`;}
  else if(r.type==="redflag"){title=`Flagged: ${r.flag}`;detail="Reversion noted";}
  return `<div class="row"><div class="g"><div class="t">${esc(title)}</div><div class="d">${esc(detail)}</div></div>
    <div style="text-align:right"><div class="pill">${fmtDate(r.date)}</div></div></div>`;
}

let RANGE_DRAFT=null, HOME_DRAFT=null, HOME_TIMER_I=null;

function freshHomeDraft(mode,view,focusIdx){
  const R=homeRoutine(mode);
  return {mode,view:view||"list",focusIdx:focusIdx||0,
    stepData:R.steps.map(s=>emptyStepData(s)),adherence:0,flags:[],note:"",
    timerSec:R.steps[focusIdx||0].m*60,timerRunning:false};
}
async function loadHomeDraftFromDB(){
  const rec=RECORDS.find(r=>r.id===HOME_DRAFT_KEY);
  if(rec&&rec.draft){
    HOME_DRAFT=rec.draft;
    const R=homeRoutine(HOME_DRAFT.mode);
    if(HOME_DRAFT.stepData.length!==R.steps.length)
      HOME_DRAFT.stepData=R.steps.map((s,i)=>HOME_DRAFT.stepData[i]||emptyStepData(s));
  }
}
async function persistHomeDraft(){
  if(!HOME_DRAFT)return;
  await dbPut({id:HOME_DRAFT_KEY,type:"meta",draft:HOME_DRAFT});
}
async function clearHomeDraft(){
  HOME_DRAFT=null;stopHomeTimer();
  await dbDel(HOME_DRAFT_KEY).catch(()=>{});
}
function bumpHome(field,stepIdx,delta){
  if(!HOME_DRAFT)return;
  const d=HOME_DRAFT.stepData[stepIdx];
  d[field]=Math.max(0,(d[field]||0)+delta);
  if(navigator.vibrate)navigator.vibrate(8);
  touchHomeDraft();
}
function touchHomeDraft(){
  persistHomeDraft();
  const run=HOME_DRAFT&&HOME_DRAFT.view==="focus"&&HOME_DRAFT.timerRunning;
  renderPracticeSub();
  if(run)startHomeTimer();
}
function stopHomeTimer(){if(HOME_TIMER_I){clearInterval(HOME_TIMER_I);HOME_TIMER_I=null;}}
function homeTimerLabel(){
  if(!HOME_DRAFT)return "0:00";
  const s=Math.max(0,HOME_DRAFT.timerSec||0);
  return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
}
function startHomeTimer(){
  if(!HOME_DRAFT)return;
  HOME_DRAFT.timerRunning=true;
  stopHomeTimer();
  HOME_TIMER_I=setInterval(()=>{
    if(!HOME_DRAFT||!HOME_DRAFT.timerRunning)return;
    HOME_DRAFT.timerSec=Math.max(0,(HOME_DRAFT.timerSec||0)-1);
    const el=document.getElementById("homeTimer");
    if(el){el.textContent=homeTimerLabel();el.classList.toggle("warn",HOME_DRAFT.timerSec<=30);}
    if(HOME_DRAFT.timerSec<=0){HOME_DRAFT.timerRunning=false;stopHomeTimer();}
    persistHomeDraft();
  },1000);
}
function pauseHomeTimer(){if(HOME_DRAFT){HOME_DRAFT.timerRunning=false;stopHomeTimer();touchHomeDraft();}}
function resetHomeTimer(){
  if(!HOME_DRAFT)return;
  const R=homeRoutine(HOME_DRAFT.mode);
  HOME_DRAFT.timerSec=R.steps[HOME_DRAFT.focusIdx].m*60;
  HOME_DRAFT.timerRunning=false;stopHomeTimer();touchHomeDraft();
}
function startHomeRoutine(mode,focus){
  TAB="practice";PRACTICE="home";
  HOME_DRAFT=freshHomeDraft(mode,focus?"focus":"list",0);
  persistHomeDraft();render();
}
function setHomeView(v){
  if(!HOME_DRAFT)return;
  HOME_DRAFT.view=v;
  if(v==="focus"){resetHomeTimer();}
  else stopHomeTimer();
  touchHomeDraft();
}
function setHomeFocus(i){
  if(!HOME_DRAFT)return;
  HOME_DRAFT.focusIdx=i;resetHomeTimer();touchHomeDraft();
}
function homeStepDone(i,adv){
  if(!HOME_DRAFT)return;
  HOME_DRAFT.stepData[i].done=true;
  const R=homeRoutine(HOME_DRAFT.mode);
  if(adv&&i<R.steps.length-1){HOME_DRAFT.focusIdx=i+1;resetHomeTimer();}
  touchHomeDraft();
}
function putt3MakeTap(i,made){
  if(!HOME_DRAFT)return;
  const d=HOME_DRAFT.stepData[i];
  d.att=(d.att||0)+1;
  if(made){d.makes=(d.makes||0)+1;d.streak=(d.streak||0)+1;d.bestStreak=Math.max(d.bestStreak||0,d.streak);}
  else d.streak=0;
  if(navigator.vibrate)navigator.vibrate(8);
  touchHomeDraft();
}

function homeTrackHTML(stepDef,data,i,compact){
  const t=stepDef.track,target=stepDef.target;
  if(t==="reps"){
    return `<div class="steptrack"><div class="tlbl">Reps \u00b7 target ${target}</div>
      <div class="counter"><div class="cc"><button onclick="bumpHome('reps',${i},-1)">\u2212</button>
      <span class="num">${data.reps||0}</span><button onclick="bumpHome('reps',${i},1)">+</button></div>
      <span class="mono small ${(data.reps||0)>=target?'tgt-ok':''}">${data.reps||0}/${target}</span></div></div>`;
  }
  if(t==="divot"){
    return `<div class="steptrack"><div class="tlbl">After the ball \u00b7 of ${target} strikes</div>
      <div class="grid2">
        <div class="counter"><span class="mono small">After</span><div class="cc"><button onclick="bumpHome('after',${i},-1)">\u2212</button>
        <span class="num">${data.after||0}</span><button onclick="bumpHome('after',${i},1)">+</button></div></div>
        <div class="counter"><span class="mono small">Total</span><div class="cc"><button onclick="bumpHome('total',${i},-1)">\u2212</button>
        <span class="num">${data.total||0}</span><button onclick="bumpHome('total',${i},1)">+</button></div></div>
      </div>
      ${data.total?`<div class="small muted" style="margin-top:8px">${Math.round((data.after||0)/data.total*100)}% after ball</div>`:""}</div>`;
  }
  if(t==="putt3"){
    return `<div class="steptrack"><div class="tlbl">3-ft gate \u00b7 target ${target}</div>
      <div class="taps">
        <button class="tap pure" onclick="putt3MakeTap(${i},true)"><div class="tn">${data.makes||0}</div><div class="tl">Make</div></button>
        <button class="tap fat" onclick="putt3MakeTap(${i},false)"><div class="tn">${(data.att||0)-(data.makes||0)}</div><div class="tl">Miss</div></button>
      </div>
      <div class="small muted" style="margin-top:8px">${data.att||0} attempts \u00b7 streak ${data.streak||0} \u00b7 best ${data.bestStreak||0}</div></div>`;
  }
  if(t==="strike"){
    return `<div class="steptrack"><div class="tlbl">Strike location \u00b7 ${target} balls</div>
      ${["center","heel","toe"].map(k=>`<div class="counter" style="margin-top:6px"><span class="mono small" style="min-width:52px">${k}</span>
        <div class="cc"><button onclick="bumpHome('${k}',${i},-1)">\u2212</button><span class="num">${data[k]||0}</span><button onclick="bumpHome('${k}',${i},1)">+</button></div></div>`).join("")}
      </div>`;
  }
  if(t==="puttLadder"){
    return `<div class="steptrack"><div class="tlbl">Putting ladder + lag</div>
      ${[["d6m","d6a","6-ft makes"],["d10m","d10a","10-ft makes"],["lagSafe","lagAtt","Lag safe"]].map(([m,a,lbl])=>`
        <div style="margin-top:8px"><div class="mono small" style="color:var(--dim);margin-bottom:4px">${lbl}</div><div class="grid2">
          <div class="counter"><span class="mono small">+</span><div class="cc"><button onclick="bumpHome('${m}',${i},-1)">\u2212</button>
          <span class="num">${data[m]||0}</span><button onclick="bumpHome('${m}',${i},1)">+</button></div></div>
          <div class="counter"><span class="mono small">att</span><div class="cc"><button onclick="bumpHome('${a}',${i},-1)">\u2212</button>
          <span class="num">${data[a]||0}</span><button onclick="bumpHome('${a}',${i},1)">+</button></div></div>
        </div></div>`).join("")}</div>`;
  }
  return "";
}

function homeFinishHTML(){
  return `<label class="f">${esc(adherenceLabel())}</label>
    <div class="stars">${[1,2,3,4,5].map(n=>`<button class="${HOME_DRAFT.adherence>=n?'on':''}" onclick="setHomeStars(${n})">\u2605</button>`).join("")}</div>

    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px">

function homeForm(){
  if(!HOME_DRAFT)HOME_DRAFT=freshHomeDraft("daily","list",0);
  if(HOME_DRAFT.view==="focus")return homeFocusForm();
  stopHomeTimer();
  return homeListForm();
}
async function setHomeMode(m){
  HOME_DRAFT=freshHomeDraft(m,HOME_DRAFT.view,0);
  await persistHomeDraft();renderPracticeSub();
}
function toggleHomeStep(i){
  HOME_DRAFT.stepData[i].done=!HOME_DRAFT.stepData[i].done;
  touchHomeDraft();
}
function setHomeStars(n){
  HOME_DRAFT.adherence=HOME_DRAFT.adherence===n?0:n;
  touchHomeDraft();
}
function homeFlag(t){
  const i=HOME_DRAFT.flags.indexOf(t);
  if(i>=0)HOME_DRAFT.flags.splice(i,1);else HOME_DRAFT.flags.push(t);
  touchHomeDraft();
}
async function discardHomeDraft(){
  if(!confirm("Discard in-progress home session?"))return;
  await clearHomeDraft();renderPracticeSub();
}
async function maybeMarkPlanDay(savedMode){
  const np=nextPlanDay();if(!np)return;
  const modeOk=np.mode===savedMode||(!np.range&&!np.speed&&!np.round);
  if(!modeOk)return;
  if(confirm(`Mark plan Day ${np.d} complete?\n${np.focus}`)){
    const rec=planRec();const set=new Set(rec.done);set.add(np.d);
    await dbPut({id:"plan-progress",type:"meta",done:[...set].sort((a,b)=>a-b)});
  }
}
async function saveHome(){
  if(!HOME_DRAFT)return;
  const doneCt=HOME_DRAFT.stepData.filter(s=>s.done).length;
  if(!doneCt&&!HOME_DRAFT.adherence){toast("Complete a step or rate adherence");return;}
  const savedMode=HOME_DRAFT.mode;
  const rec={id:uid(),type:"home",date:today(),mode:savedMode,
    stepData:HOME_DRAFT.stepData.map(s=>({...s})),adherence:HOME_DRAFT.adherence,
    flags:HOME_DRAFT.flags.slice(),note:HOME_DRAFT.note||"",swingThought:swingThoughtText()};
  await dbPut(rec);
  for(const f of rec.flags)await dbPut({id:uid(),type:"redflag",date:today(),flag:f});
  await clearHomeDraft();await refresh();
  toast("Home session saved");await maybeMarkPlanDay(savedMode);renderPracticeSub();
}

   <label class="f">Red flag felt this session?</label>
   <div style="display:flex;flex-wrap:wrap;gap:7px">
     ${RED_FLAGS.map(f=>`<button class="pill ${D.flags.includes(f.t)?'score':''}" style="cursor:pointer;border-style:solid" onclick="rngFlag('${esc(f.t).replace(/'/g,"\\'")}')">${esc(f.t)}</button>`).join("")}
   </div>
   <label class="f">Note</label>
   <textarea placeholder="Clubs, conditions, what you worked on" oninput="RANGE_DRAFT.note=this.value">${esc(D.note)}</textarea>
   <div style="margin-top:16px"><button class="btn primary" onclick="saveRange()" ${total?"":"disabled"}>Save session</button></div>`;
  return h;
}
function rngTally(k,n){RANGE_DRAFT.tally[k]=Math.max(0,RANGE_DRAFT.tally[k]+n);RANGE_DRAFT._last=k;renderPracticeSub();}
function rngUndo(){if(RANGE_DRAFT._last)RANGE_DRAFT.tally[RANGE_DRAFT._last]=Math.max(0,RANGE_DRAFT.tally[RANGE_DRAFT._last]-1);renderPracticeSub();}
function rngLow(k,n){RANGE_DRAFT.low[k]=Math.max(0,RANGE_DRAFT.low[k]+n);renderPracticeSub();}
function rngFlag(t){const i=RANGE_DRAFT.flags.indexOf(t);if(i>=0)RANGE_DRAFT.flags.splice(i,1);else RANGE_DRAFT.flags.push(t);renderPracticeSub();}
async function saveRange(){
  const D=RANGE_DRAFT;
  await dbPut({id:uid(),type:"range",date:today(),size:D.size,tally:{...D.tally},low:{...D.low},flags:D.flags.slice(),note:D.note});
  for(const f of D.flags)await dbPut({id:uid(),type:"redflag",date:today(),flag:f});
  RANGE_DRAFT=null;await refresh();toast("Range session saved");renderPracticeSub();}

async function saveSpeed(){

async function savePutt(){

/* ============================ RENDER: ROUNDS ============================ */

    <div class="metric"><div class="lbl">Last score</div><div class="val">${rounds[0]?rounds[0].score:"\u2014"}</div>${spark(scoreSeries,{color:"var(--yellow)"})}</div>

async function saveRound(){
  const g=id=>$("#"+id).value;const n=id=>+g(id)||0;
  if(!n("rdScore")){toast("Enter a score");return;}
  await dbPut({id:uid(),type:"round",date:today(),score:n("rdScore"),holes:+g("rdHoles")||18,
    rating:+g("rdRating")||null,slope:+g("rdSlope")||null,doubles:n("rdDbl"),threePutts:n("rd3p"),
    udConv:n("rdUd"),udAtt:n("rdUdA"),good:g("rdGood"),reverted:g("rdBad"),next:g("rdNext")});
  await refresh();toast("Round saved");renderRounds();}

async function togglePlan(d){
  const rec=planRec();const set=new Set(rec.done);
  if(set.has(d))set.delete(d);else set.add(d);
  await dbPut({id:"plan-progress",type:"meta",done:[...set].sort((a,b)=>a-b)});
  await refresh();renderPlan();
}
function checkpointHTML(){
  const rg=byType("range"),pt=byType("putting"),rd=byType("round");
  const latest=rg[0]?rangeMetrics(rg[0]):null;
  const fat=latest?latest.fatPer70:null;
  const bf=latest?latest.ballFirst:null;
  const make=pt.map(puttMake).find(v=>v!=null);
  const dbl=rd[0]?rd[0].doubles:null;
  const tp=rd[0]?rd[0].threePutts:null;
  function line(label,val,unit,ok,target){
    const cls=val==null?"":ok?"tgt-ok":"tgt-bad";
    return `<div class="cp"><div class="cg"><div class="ct">${label}</div><div class="cs">Target: ${target}</div></div>
      <div class="cv ${cls}">${val==null?"\u2014":val+unit}</div></div>`;
  }
  return [
    line("Fat shots per 70",fat,"",fat!=null&&fat<2," < 2"),
    line("Ball-first %",bf,"%",bf!=null&&bf>=85,"\u2265 85%"),
    line("Short putt make %",make,"%",make!=null&&make>=70,"\u2265 70% (3\u20136 ft)"),
    line("Doubles+ per round",dbl,"",dbl!=null&&dbl<=2,"\u2264 2"),
    line("3-putts per round",tp,"",tp!=null&&tp<=1,"\u2264 1")
  ].join("");
}

function journalHTML(){
  const t=today();
  const rg=byType("range").find(r=>r.date===t);
  const rgM=rg?rangeMetrics(rg):null;
  const sp=byType("speed").find(r=>r.date===t);
  const pt=byType("putting").find(r=>r.date===t);
  const hm=byType("home").find(r=>r.date===t);
  const flags=RECORDS.filter(r=>r.type==="redflag"&&r.date===t).map(r=>r.flag);
  const row=(l,v)=>`<div class="row"><div class="g"><div class="d" style="font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;font-size:10px">${l}</div><div class="t" style="margin-top:2px">${v}</div></div></div>`;
  return `<div class="eyebrow">${new Date(t+"T00:00:00").toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"})}</div>
    ${cueVisible()?`<div style="font-weight:600;color:var(--yellow);margin:6px 0 4px">${esc(swingThoughtText())}</div>`:""}
    ${row("Routine",hm?homeSummary(normalizeHomeRec(hm)):"\u2014")}
    ${row("Range",rgM?`${rgM.total} balls \u00b7 grade ${gradeLetter(rgM.grade)} \u00b7 ${rg.tally.fat} fat \u00b7 ${rgM.ballFirst}% ball-first`:"\u2014")}
    ${row("Speed",sp?`max ${Math.max(...sp.readings.map(x=>x.max||0))} mph \u00b7 ${sp.balanceHeld?"balance held":"balance dropped"}`:"\u2014")}
    ${row("Putting",pt?`3ft ${pt.d3.makes}/${pt.d3.att} \u00b7 6ft ${pt.d6.makes}/${pt.d6.att} \u00b7 10ft ${pt.d10.makes}/${pt.d10.att}`:"\u2014")}
    ${row("Red flags felt",flags.length?flags.join(", "):"none")}`;
}
async function logFlag(t){await dbPut({id:uid(),type:"redflag",date:today(),flag:t});await refresh();toast("Logged: "+t);}

/* ============================ DATA EXPORT/IMPORT ============================ */
function exportData(){
  const blob=new Blob([JSON.stringify({app:"PracticeIQ",version:1,exported:new Date().toISOString(),records:RECORDS},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="practiceiq-backup-"+today()+".json";a.click();URL.revokeObjectURL(a.href);
  toast("Backup downloaded");
}
function importData(input){
  const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=async()=>{try{const data=JSON.parse(r.result);const recs=data.records||data;
    if(!Array.isArray(recs))throw 0;
    for(const rec of recs)if(rec&&rec.id)await dbPut(rec);
    await refresh();toast("Backup restored");render();
  }catch(e){toast("Couldn\u2019t read that file");}input.value="";};
  r.readAsText(f);
}
async function resetData(){
  if(!confirm("Delete all PracticeIQ data on this device? Export a backup first if you want to keep it."))return;
  HOME_DRAFT=null;stopHomeTimer();
  await dbClear();await refresh();toast("All data cleared");render();
}
async function delRec(id){await dbDel(id);await refresh();render();}
