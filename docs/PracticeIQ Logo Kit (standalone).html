  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0c8f984e-c900-4436-a46f-e99203618c56\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ec8b9ce3-f141-4cd5-8b9f-c84127c3d8ed\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --felt: #0E2A22; --felt-deep: #0A201A; --ivory: #F2EBDA;\n    --fairway: #46C98A; --fairway-deep: #1F8F5F; --yellow: #F4D03F;\n    --line: rgba(242, 235, 218, 0.10); --dim: rgba(242, 235, 218, 0.55);\n  }\n  * { box-sizing: border-box; }\n  body {\n    margin: 0; background: var(--felt-deep); color: var(--ivory);\n    font-family: 'Space Grotesk', sans-serif; -webkit-font-smoothing: antialiased;\n  }\n  .page { max-width: 1060px; margin: 0 auto; padding: 64px 40px 96px; }\n  header { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 18px; }\n  h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }\n  .crumb { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--dim); }\n  h2 { font-size: 14px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fairway); margin: 64px 0 18px; }\n  p.lead { color: var(--dim); font-size: 15.5px; line-height: 1.6; max-width: 66ch; margin: 0 0 8px; text-wrap: pretty; }\n  p.lead .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--fairway); }\n\n  .hero { display: grid; grid-template-columns: 280px 1fr; gap: 20px; margin-top: 28px; }\n  .card { background: var(--felt); border: 1px solid var(--line); border-radius: 14px; display: flex; align-items: center; justify-content: center; }\n  .card.light { background: var(--ivory); }\n  .hero .card { min-height: 280px; }\n  .hero-right { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }\n  .hero-right img { width: 72%; max-width: 460px; display: block; }\n\n  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }\n  .asset { background: var(--felt); border: 1px solid var(--line); border-radius: 14px; padding: 18px 16px 14px; display: flex; flex-direction: column; align-items: center; gap: 12px; }\n  .asset.light { background: var(--ivory); }\n  .asset .preview { height: 110px; display: flex; align-items: center; justify-content: center; }\n  .asset .meta { text-align: center; }\n  .asset .name { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ivory); word-break: break-all; }\n  .asset.light .name { color: var(--felt); }\n  .asset .dim { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--dim); margin-top: 4px; }\n  .asset.light .dim { color: rgba(14, 42, 34, 0.55); }\n  .mask-demo { width: 96px; height: 96px; border-radius: 50%; overflow: hidden; }\n  .mask-demo img { width: 100%; height: 100%; display: block; }\n\n  pre {\n    background: var(--felt); border: 1px solid var(--line); border-radius: 14px;\n    padding: 20px 24px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;\n    font-size: 12.5px; line-height: 1.65; color: var(--ivory); margin: 0 0 16px;\n  }\n  pre .c { color: var(--dim); }\n  pre .k { color: var(--fairway); }\n  pre .y { color: var(--yellow); }\n\n  .rules { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n  .rule { background: var(--felt); border: 1px solid var(--line); border-radius: 14px; padding: 20px 22px; }\n  .rule b { display: block; font-size: 14px; margin-bottom: 8px; color: var(--ivory); }\n  .rule span { font-size: 13.5px; line-height: 1.55; color: var(--dim); display: block; text-wrap: pretty; }\n\n  @media (max-width: 880px) {\n    .hero { grid-template-columns: 1fr; }\n    .grid { grid-template-columns: repeat(2, 1fr); }\n    .rules { grid-template-columns: 1fr; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"page\">\n  <header>\n    <h1>PracticeIQ — Logo Kit<\u002Fh1>\n    <div class=\"crumb\">direction B · the logbook · v1.0 · sibling to GreenIQ<\u002Fdiv>\n  <\u002Fheader>\n  <p class=\"lead\">A practice journal mark: a scorecard card with entry rows, today's rep flagged in\n  flag-yellow. Shares GreenIQ's palette, Space Grotesk wordmark, and yellow-as-the-one-pop logic.\n  Everything below lives in <span class=\"mono\">practiceiq-logo/<\u002Fspan> — drop the folder into your PWA.<\u002Fp>\n\n  <h2 data-screen-label=\"Primary\">Primary<\u002Fh2>\n  <div class=\"hero\">\n    <div class=\"card\"><img src=\"459b0493-71f9-409d-9f71-30d5a971d828\" alt=\"PracticeIQ app icon\" style=\"width:200px;border-radius:44px;\"><\u002Fdiv>\n    <div class=\"hero-right\">\n      <div class=\"card\"><img src=\"f761ae74-a0c4-4d82-8360-63b1eb817dda\" alt=\"PracticeIQ lockup on dark\"><\u002Fdiv>\n      <div class=\"card light\"><img src=\"44d4ad1c-90a4-4dec-bb9a-019f718319fc\" alt=\"PracticeIQ lockup on light\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2 data-screen-label=\"Vector\">Vector — SVG<\u002Fh2>\n  <div class=\"grid\">\n    <div class=\"asset\"><div class=\"preview\"><img src=\"5b663a5d-1a64-4c35-aab6-9141b62ac4e8\" alt=\"\" width=\"74\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">mark.svg<\u002Fdiv><div class=\"dim\">for dark surfaces<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset light\"><div class=\"preview\"><img src=\"1a76e208-ba55-467f-87a3-2bc5845f4a93\" alt=\"\" width=\"74\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">mark-light.svg<\u002Fdiv><div class=\"dim\">for light surfaces<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset\"><div class=\"preview\" style=\"color:var(--ivory)\"><img src=\"3c7280b1-ea17-4feb-8a2e-b1824d01ce41\" alt=\"\" width=\"74\" style=\"filter:invert(0.95) sepia(0.1)\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">mark-mono.svg<\u002Fdiv><div class=\"dim\">currentColor — tint via CSS<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset\"><div class=\"preview\"><img src=\"4a1e3ec1-329e-4300-a3ab-a5d33be43dbd\" alt=\"\" width=\"84\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">favicon.svg<\u002Fdiv><div class=\"dim\">scalable favicon<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2 data-screen-label=\"AppIcons\">App icons — PNG<\u002Fh2>\n  <div class=\"grid\">\n    <div class=\"asset\"><div class=\"preview\"><img src=\"459b0493-71f9-409d-9f71-30d5a971d828\" alt=\"\" width=\"96\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">icon-512.png<\u002Fdiv><div class=\"dim\">512 × 512 · purpose: any<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset\"><div class=\"preview\"><img src=\"ba73d398-708c-414e-8d65-7423499d0cb7\" alt=\"\" width=\"96\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">icon-192.png<\u002Fdiv><div class=\"dim\">192 × 192 · purpose: any<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset\"><div class=\"preview\"><div class=\"mask-demo\"><img src=\"70f1aa30-3274-44c2-9616-1d6241da511a\" alt=\"\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">icon-maskable-512/192.png<\u002Fdiv><div class=\"dim\">mark inside 80% safe zone<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset\"><div class=\"preview\"><img src=\"20ebd2a1-68ae-4a74-88bb-2efb2ae0f212\" alt=\"\" width=\"96\" style=\"border-radius:21px;\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">apple-touch-icon.png<\u002Fdiv><div class=\"dim\">180 × 180 · iOS rounds it<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2 data-screen-label=\"Favicons\">Favicons &amp; lockups<\u002Fh2>\n  <div class=\"grid\">\n    <div class=\"asset\"><div class=\"preview\"><img src=\"c7464c63-a583-4c6d-928e-ac07225133ec\" alt=\"\" width=\"32\" style=\"image-rendering:auto\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">favicon-32.png<\u002Fdiv><div class=\"dim\">32 × 32 · corners baked<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset\"><div class=\"preview\"><img src=\"e4da701f-eb6e-4eb1-9b69-a065ff77b56e\" alt=\"\" width=\"16\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">favicon-16.png<\u002Fdiv><div class=\"dim\">16 × 16<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset\"><div class=\"preview\"><img src=\"f761ae74-a0c4-4d82-8360-63b1eb817dda\" alt=\"\" style=\"width:130px\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">lockup-dark.png<\u002Fdiv><div class=\"dim\">924 × 236<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"asset light\"><div class=\"preview\"><img src=\"44d4ad1c-90a4-4dec-bb9a-019f718319fc\" alt=\"\" style=\"width:130px\"><\u002Fdiv>\n      <div class=\"meta\"><div class=\"name\">lockup-light.png<\u002Fdiv><div class=\"dim\">924 × 236<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2 data-screen-label=\"Manifest\">Drop-in — manifest.webmanifest<\u002Fh2>\n  <pre>{\n  <span class=\"k\">\"theme_color\"<\u002Fspan>: <span class=\"y\">\"#0E2A22\"<\u002Fspan>,\n  <span class=\"k\">\"background_color\"<\u002Fspan>: <span class=\"y\">\"#0A201A\"<\u002Fspan>,\n  <span class=\"k\">\"icons\"<\u002Fspan>: [\n    { \"src\": \"practiceiq-logo/icon-192.png\",          \"sizes\": \"192x192\", \"type\": \"image/png\" },\n    { \"src\": \"practiceiq-logo/icon-512.png\",          \"sizes\": \"512x512\", \"type\": \"image/png\" },\n    { \"src\": \"practiceiq-logo/icon-maskable-192.png\", \"sizes\": \"192x192\", \"type\": \"image/png\", \"purpose\": \"maskable\" },\n    { \"src\": \"practiceiq-logo/icon-maskable-512.png\", \"sizes\": \"512x512\", \"type\": \"image/png\", \"purpose\": \"maskable\" }\n  ]\n}<\u002Fpre>\n\n  <h2 data-screen-label=\"Head\">Drop-in — &lt;head&gt; + live lockup<\u002Fh2>\n  <pre><span class=\"c\">&lt;!-- favicons --&gt;<\u002Fspan>\n&lt;link rel=\"icon\" href=\"practiceiq-logo/favicon.svg\" type=\"image/svg+xml\"&gt;\n&lt;link rel=\"icon\" href=\"practiceiq-logo/favicon-32.png\" sizes=\"32x32\" type=\"image/png\"&gt;\n&lt;link rel=\"apple-touch-icon\" href=\"practiceiq-logo/apple-touch-icon.png\"&gt;\n&lt;meta name=\"theme-color\" content=\"#0E2A22\"&gt;\n\n<span class=\"c\">&lt;!-- live lockup (crispest at any size — uses the webfont) --&gt;<\u002Fspan>\n&lt;link href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;display=swap\" rel=\"stylesheet\"&gt;\n&lt;div style=\"display:flex;align-items:center;gap:0.42em;font-family:'Space Grotesk',sans-serif;\n            font-size:32px;letter-spacing:-0.03em;line-height:1\"&gt;\n  &lt;img src=\"practiceiq-logo/mark.svg\" alt=\"\" style=\"width:1.42em;height:1.42em\"&gt;\n  &lt;span&gt;&lt;span style=\"font-weight:500;color:#F2EBDA\"&gt;Practice&lt;/span&gt;&lt;span\n    style=\"font-weight:700;color:#46C98A;margin-left:-0.12em\"&gt;IQ&lt;/span&gt;&lt;/span&gt;\n&lt;/div&gt;<\u002Fpre>\n\n  <h2 data-screen-label=\"Rules\">Usage<\u002Fh2>\n  <div class=\"rules\">\n    <div class=\"rule\"><b>Clear space &amp; minimum size<\u002Fb>\n      <span>Keep clear space around the mark ≥ half the card width. Minimum mark size 24px — the entry rows muddy below that, so use favicon.svg for tab-size contexts.<\u002Fspan><\u002Fdiv>\n    <div class=\"rule\"><b>Color<\u002Fb>\n      <span>Fairway green #46C98A and flag yellow #F4D03F on dark felt only. On light surfaces use the derived deep shades (#1F8F5F / #D9AE1B) baked into mark-light.svg. Single-color: mark-mono.svg inherits currentColor.<\u002Fspan><\u002Fdiv>\n    <div class=\"rule\"><b>Don't<\u002Fb>\n      <span>Don't rotate the mark, add more rows, recolor the card, move the yellow bullet off the top entry, add shadows or gradients, or set the wordmark in another typeface.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
